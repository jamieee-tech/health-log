                const proteinGoal = parseInt(document.getElementById('protein-goal-input').value) || 120;
                const totalProteinCeil = Math.ceil(group.totalProtein);
                const proteinPercent = Math.min(100, Math.round((totalProteinCeil / proteinGoal) * 100));
                const proteinMet = totalProteinCeil >= proteinGoal;
                const proteinOverflow = totalProteinCeil > proteinGoal * 1.2;
                const proteinFillColor = proteinOverflow ? '#e74c3c' : (proteinMet ? '#2ecc71' : '#f39c12');
                const proteinBarExtra = proteinOverflow ? 'animation:blink 0.8s step-start infinite;' : '';
                const proteinRemaining = Math.max(0, proteinGoal - totalProteinCeil);
                const waterRemaining = Math.max(0, 2000 - group.totalWater);

                const stats = bodyStats[dateKey];
                const weightPill = stats?.weight ? `<div class="date-stat-pill stat-weight">⚖️ 體重 <span class="pill-val">${stats.weight} kg</span></div>` : '';
                const fatPill = stats?.fat ? `<div class="date-stat-pill stat-fat">🔬 體脂 <span class="pill-val">${stats.fat} %</span></div>` : '';

                const header = document.createElement('div');
                header.className = 'date-card-header';
                header.innerHTML = `
                    <!-- Row 1: Date -->
                    <h3 style="font-weight:900;">📅 ${group.dateStr}</h3>

                    <!-- Row 2: Progress bars (pills row removed) -->
                    <div class="date-progress-row">
                        <div class="progress-group">
                            <label>
                                <span style="color:#3498db;font-size:0.85rem;">💧 飲水: ${group.totalWater} / 2000 cc</span>
                                <span style="color:var(--text-secondary);font-size:0.78rem;">${group.totalWater >= 2000 ? '已達成 ✅' : '還差 ' + waterRemaining + ' cc'}</span>
                            </label>
                            <div class="prog-bar">
                                <div class="prog-fill" style="width:${waterPercent}%;background:#3498db;"></div>
                            </div>
                        </div>
                        <div class="progress-group">
                            <label>
                                <span style="color:${proteinFillColor};font-size:0.85rem;">🍖 蛋白: ${totalProteinCeil} / ${proteinGoal} g</span>
                                <span style="color:var(--text-secondary);font-size:0.78rem;">${proteinMet ? '已達成目標 ✅' : '還差 ' + proteinRemaining + 'g'}</span>
                            </label>
                            <div class="prog-bar">
                                <div class="prog-fill" style="width:${proteinPercent}%;background:${proteinFillColor};${proteinBarExtra}"></div>
                            </div>
                        </div>
                    </div>
                `;
                card.appendChild(header);

                // Separate records by type
                const exerciseItems = group.items.filter(r => r.category === 'exercise');
                const waterItems = group.items.filter(r => r.category === 'water');
                const dietItems = group.items.filter(r => r.category === 'diet');

                // Helper: add accordion toggle behaviour
                function makeAccordion(el) {
                    el.addEventListener('click', e => {
                        // Don't collapse when clicking the delete button itself
                        if (e.target.closest('.ri-delete')) return;
                        el.classList.toggle('expanded');
                    });
                    return el;
                }

                // Format timestamp to HH:MM
                function fmtTime(ts) {
                    const d = new Date(ts);
                    return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
                }

                // Helper: build a trash SVG string
                const trashSvg = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>`;

                function buildExerciseDiv(record) {
                    const d = document.createElement('div');
                    d.className = 'record-item exercise';
                    const noteBadge = record.note
                        ? `<span style="display:inline-block;margin-left:0.4rem;padding:0.15rem 0.55rem;background:#f0f2f5;border-radius:20px;font-size:0.72rem;color:#7f8c99;font-weight:500;vertical-align:middle;">${record.note}</span>`
                        : '';
                    d.innerHTML = `
                        <div class="ri-header">
                            <span class="ri-name">🏃‍♂️ ${record.type}${noteBadge}</span>
                            <span class="ri-value">${record.load} Load</span>
                            <span class="ri-toggle">❯</span>
                        </div>
                        <div class="ri-body">
                            <div class="ri-body-inner">
                                <div class="ri-detail-row">
                                    <span class="ri-chip">⏱ <strong>${record.time}</strong> 分鐘</span>
                                    <span class="ri-chip">⏰ <strong>${fmtTime(record.timestamp)}</strong></span>
                                    ${record.note ? `<span class="ri-chip">📝 ${record.note}</span>` : ''}
                                </div>
                                <button class="ri-delete" onclick="deleteRecord('${record.id}')">${trashSvg} 刪除</button>
                            </div>
                        </div>`;
                    return makeAccordion(d);
                }

                function buildDietDiv(record) {
                    const isTextOnly = !!record.isTextOnly;
                    const isVeggie = record.group === '蔬菜類';
                    const d = document.createElement('div');
                    d.className = `record-item diet${isVeggie ? ' vegetable' : ''}${isTextOnly ? ' text-only' : ''}`;

                    if (isTextOnly) {
                        // Minimal display: name + time + delete only
                        d.innerHTML = `
                            <div class="ri-header">
                                <span class="ri-name">📝 ${record.name}</span>
                                <span class="ri-toggle">❯</span>
                            </div>
                            <div class="ri-body">
                                <div class="ri-body-inner">
                                    <div class="ri-detail-row">
                                        <span class="ri-chip">⏰ <strong>${fmtTime(record.timestamp)}</strong></span>
                                        <span class="ri-chip" style="color:#b0b8c4;">外食 / 未估算</span>
                                    </div>
                                    <button class="ri-delete" onclick="deleteRecord('${record.id}')">${trashSvg} 刪除</button>
                                </div>
                            </div>`;
                    } else {
                        d.innerHTML = `
                            <div class="ri-header">
                                <span class="ri-name">🥗 ${record.name}</span>
                                <span class="ri-value">${Math.ceil(record.calories)} kcal</span>
                                <span class="ri-toggle">❯</span>
                            </div>
                            <div class="ri-body">
                                <div class="ri-body-inner">
                                    <div class="ri-detail-row">
                                        <span class="ri-chip">🍖 <strong>${record.protein}g</strong> 蛋白</span>
                                        <span class="ri-chip">🍞 ${record.carbs}g 碳水</span>
                                        <span class="ri-chip">🧈 ${record.fat}g 脂肪</span>
                                        <span class="ri-chip">⏰ <strong>${fmtTime(record.timestamp)}</strong></span>
                                    </div>
                                    <button class="ri-delete" onclick="deleteRecord('${record.id}')">${trashSvg} 刪除</button>
                                </div>
                            </div>`;
                    }
                    return makeAccordion(d);
                }

                function buildWaterDiv(record) {
                    const d = document.createElement('div');
                    d.className = 'record-item water';
                    d.innerHTML = `
                        <div class="ri-header">
                            <span class="ri-name" style="color:#3498db;">💧 飲水</span>
                            <span class="ri-value" style="color:#3498db;">${record.amount} cc</span>
                            <span class="ri-toggle">❯</span>
                        </div>
                        <div class="ri-body">
                            <div class="ri-body-inner">
                                <div class="ri-detail-row">
                                    <span class="ri-chip">⏰ <strong>${fmtTime(record.timestamp)}</strong></span>
                                </div>
                                <button class="ri-delete" onclick="deleteRecord('${record.id}')">${trashSvg} 刪除</button>
                            </div>
                        </div>`;
                    return makeAccordion(d);
                }

                const MEAL_ORDER = ['早餐', '午餐', '晵餐', '點心/其他'];
                const MEAL_EMOJI = { '早餐': '☀️', '午餐': '☀️️', '晵餐': '🌙', '點心/其他': '🍪' };

                /**
                 * Build a collapsible period-group accordion.
                 * @param {string} label      Display name
                 * @param {string} emoji      Prefix emoji
                 * @param {Array}  items      Record items for this group
                 * @param {string[]} chips    Subtotal chip strings
                 * @param {Function} buildFn  Record-item builder
                 * @param {boolean} defaultOpen
                 */
                function buildPeriodGroup(label, emoji, items, chips, buildFn, defaultOpen = true) {
                    const group = document.createElement('div');
                    group.className = `period-group${defaultOpen ? ' open' : ''}`;

                    const chipHtml = chips.map(c => `<span class="pg-chip">${c}</span>`).join('');
                    const hdr = document.createElement('div');
                    hdr.className = 'period-group-header';
                    hdr.innerHTML = `
                        <span class="pg-label">${emoji} ${label}</span>
                        <div class="pg-meta">${chipHtml}<span class="pg-arrow">❯</span></div>`;
                    hdr.addEventListener('click', () => group.classList.toggle('open'));

                    const body = document.createElement('div');
                    body.className = 'period-group-body';
                    items.forEach(r => body.appendChild(buildFn(r)));

                    group.appendChild(hdr);
                    group.appendChild(body);
                    return group;
                }

                // —— Exercise group ————————————————————————————
                if (exerciseItems.length > 0) {
                    const exLoad = exerciseItems.reduce((s, r) => s + r.load, 0);
                    const exTime = exerciseItems.reduce((s, r) => s + r.time, 0);
                    card.appendChild(buildPeriodGroup(
                        '運動紀錄', '💪', exerciseItems,
                        [`${exLoad} Load`, `${exTime} 分鐘`],
                        buildExerciseDiv, false
                    ));
                }

                // —— Diet groups by meal period ———————————————————
                const periodsInDay = MEAL_ORDER.filter(p => dietItems.some(r => (r.mealPeriod || '午餐') === p));
                dietItems.forEach(r => {
                    const mp = r.mealPeriod || '午餐';
                    if (!periodsInDay.includes(mp)) periodsInDay.push(mp);
                });

                periodsInDay.forEach(period => {
                    const pItems = dietItems.filter(r => (r.mealPeriod || '午餐') === period);
                    if (pItems.length === 0) return;
                    const pCals = pItems.reduce((s, r) => s + r.calories, 0);
                    const pProt = pItems.reduce((s, r) => s + r.protein, 0);
                    card.appendChild(buildPeriodGroup(
                        period, MEAL_EMOJI[period] || '🍴', pItems,
                        [`${Math.ceil(pCals)} kcal`, `${pProt.toFixed(1)}g 蛋白`],
                        buildDietDiv, false
                    ));
                });

                // —— Water group —————————————————————————————
                if (waterItems.length > 0) {
                    const wTotal = waterItems.reduce((s, r) => s + r.amount, 0);
                    card.appendChild(buildPeriodGroup(
                        '飲水', '💧', waterItems,
                        [`${wTotal} cc`],
                        buildWaterDiv, false
                    ));
                }

                historyContainer.appendChild(card);
            });
        }

        function updateDashboard() {
            // Use the selected date from the date picker
            const todayStr = document.getElementById('record-date-input').value;

            // All totals reset to 0 on every call
            let totalCals = 0;
            let totalCarbsVal = 0;
            let totalProteinVal = 0;
            let totalFatVal = 0;
            let totalLoadVal = 0;
            let totalTimeVal = 0;

            records.forEach(record => {
                // Only count records that belong to TODAY
                const recDate = new Date(record.timestamp);
                const recStr = `${recDate.getFullYear()}-${String(recDate.getMonth() + 1).padStart(2, '0')}-${String(recDate.getDate()).padStart(2, '0')}`;
                if (recStr !== todayStr) return;

                if (record.category === 'diet') {
                    totalCals += record.calories;
                    totalCarbsVal += record.carbs;
                    totalProteinVal += record.protein;
                    totalFatVal += record.fat;
                } else if (record.category === 'exercise') {
                    totalLoadVal += record.load;
                    totalTimeVal += record.time;
                }
            });

            // Update animation targets
            counterElements.totalCalories.target = Math.ceil(totalCals);
            counterElements.totalCarbs.target = totalCarbsVal;
            counterElements.totalProtein.target = totalProteinVal;
            counterElements.totalFat.target = totalFatVal;
            counterElements.totalLoad.target = totalLoadVal;
            counterElements.totalTime.target = totalTimeVal;

            triggerAnimations();
        }

        // Export Functionality
        document.getElementById('export-excel-btn').addEventListener('click', () => {
            const mInput = document.getElementById('export-month').value;
            if (!mInput) { alert('請先選擇要匯出的月份！'); return; }

            const [year, month] = mInput.split('-');
            const targetYear = parseInt(year);
            const targetMonth = parseInt(month) - 1;

            const monthRecords = records.filter(r => {
                const d = new Date(r.timestamp);
                return d.getFullYear() === targetYear && d.getMonth() === targetMonth;
            });

            if (monthRecords.length === 0) { alert('該月份沒有任何紀錄可以匯出！'); return; }

            // ── PASS 1: Pre-compute daily aggregates ───────────────────────
            const dailyTotals = {}; // keyed by dateStr
            monthRecords.forEach(r => {
                const k = new Date(r.timestamp).toLocaleDateString('zh-TW');
                if (!dailyTotals[k]) {
                    dailyTotals[k] = { cals: 0, carbs: 0, protein: 0, fat: 0, water: 0, load: 0 };
                }
                if (r.category === 'diet') {
                    dailyTotals[k].cals += r.calories || 0;
                    dailyTotals[k].carbs += r.carbs || 0;
                    dailyTotals[k].protein += r.protein || 0;
                    dailyTotals[k].fat += r.fat || 0;
                } else if (r.category === 'water') {
                    dailyTotals[k].water += r.amount || 0;
                } else if (r.category === 'exercise') {
                    dailyTotals[k].load += r.load || 0;
                }
            });

            // ── PASS 2: Sort records ────────────────────────────────────────
            const MEAL_ORDER = ['早餐', '午餐', '晚餐', '點心/其他', '運動', '飲水'];
            const mealRank = p => { const i = MEAL_ORDER.indexOf(p); return i === -1 ? 99 : i; };

            const sorted = [...monthRecords].sort((a, b) => {
                const da = new Date(a.timestamp), db = new Date(b.timestamp);
                if (da.toDateString() !== db.toDateString()) return db - da; // newest first
                const pa = a.category === 'exercise' ? '運動' : a.category === 'water' ? '飲水' : (a.mealPeriod || '午餐');
                const pb = b.category === 'exercise' ? '運動' : b.category === 'water' ? '飲水' : (b.mealPeriod || '午餐');
                return mealRank(pa) - mealRank(pb);
            });

            // ── PASS 3: Build rows ──────────────────────────────────────────
            const rows = sorted.map(r => {
                const dateStr = new Date(r.timestamp).toLocaleDateString('zh-TW');
                const dt = dailyTotals[dateStr];

                // ── Body stats: match key using SAME format as addBodyStats ──
                const statsDateOptions = { weekday: 'long', year: 'numeric', month: '2-digit', day: '2-digit' };
                const statsDateKey = new Date(r.timestamp).toLocaleDateString('zh-TW', statsDateOptions);
                const bStats = bodyStats[statsDateKey] || {};

                // Shared daily total columns (all integers)
                const dailyCols = {
                    '當日總熱量(kcal)': Math.ceil(dt.cals),
                    '當日總碳水(g)': Math.ceil(dt.carbs),
                    '當日總蛋白(g)': Math.ceil(dt.protein),
                    '當日總脂肪(g)': Math.ceil(dt.fat),
                    '當日總飲水(cc)': Math.ceil(dt.water),
                    '當日總負荷': Math.ceil(dt.load)
                };

                const bodyStatsCols = {
                    '體重(kg)': bStats.weight ? parseFloat(bStats.weight).toFixed(1) : '未紀錄',
                    '體脂(%)': bStats.fat ? parseFloat(bStats.fat).toFixed(1) : '未紀錄'
                };

                if (r.category === 'exercise') {
                    return {
                        '日期': dateStr,
                        ...bodyStatsCols,
                        '時段': '運動',
                        '項目名稱': r.type,
                        '份量': `${r.time} 分鐘`,
                        '單項負荷': r.load,
                        '單項熱量(kcal)': 0,
                        ...dailyCols
                    };
                } else if (r.category === 'diet') {
                    const gramsMatch = r.name.match(/\((\d+(?:\.\d+)?)g\)/);
                    return {
                        '日期': dateStr,
                        ...bodyStatsCols,
                        '時段': r.mealPeriod || '午餐',
                        '項目名稱': r.name,
                        '份量': gramsMatch ? gramsMatch[1] + 'g' : '-',
                        '單項負荷': 0,
                        '單項熱量(kcal)': Math.ceil(r.calories),
                        ...dailyCols
                    };
                } else {
                    return {
                        '日期': dateStr,
                        ...bodyStatsCols,
                        '時段': '飲水',
                        '項目名稱': '飲水紀錄',
                        '份量': `${r.amount} cc`,
                        '單項負荷': 0,
                        '單項熱量(kcal)': 0,
                        ...dailyCols
                    };
                }
            });

            // ── Build workbook ──────────────────────────────────────────────
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(rows);
            ws['!cols'] = [
                { wch: 14 }, // 日期
                { wch: 10 }, // 體重
                { wch: 9 }, // 體脂
                { wch: 10 }, // 時段
                { wch: 24 }, // 項目名稱
                { wch: 10 }, // 份量
                { wch: 10 }, // 單項負荷
                { wch: 14 }, // 單項熱量
                { wch: 14 }, // 當日總熱量
                { wch: 13 }, // 當日總碳水
                { wch: 13 }, // 當日總蛋白
                { wch: 13 }, // 當日總脂肪
                { wch: 14 }, // 當日總飲水
                { wch: 12 }  // 當日總負荷
            ];
            XLSX.utils.book_append_sheet(wb, ws, '健康日誌明細');

            // Filename: 健康紀錄報表_YYYYMMDD.xlsx (today's date)
            const today = new Date();
            const stamp = today.getFullYear().toString()
                + String(today.getMonth() + 1).padStart(2, '0')
                + String(today.getDate()).padStart(2, '0');
            XLSX.writeFile(wb, `健康紀錄報表_${stamp}.xlsx`);
        });

        // Init Data Load (mock starting data based on instructions)
        function setDefaultMonth() {
            const today = new Date();
            const y = today.getFullYear();
            const m = String(today.getMonth() + 1).padStart(2, '0');
            const moInput = document.getElementById('export-month');
            if (moInput) {
                moInput.value = `${y}-${m}`;
            }
        }

        // Auto-select meal period based on current hour
        function setDefaultMealPeriod() {
            const h = new Date().getHours();
            let period;
            if (h < 10) period = '早餐';       // 00:00–09:59
            else if (h < 17) period = '午餐';       // 10:00–16:59
            else if (h >= 17 && h <= 21) period = '晚餐';       // 17:00–21:59
            else period = '點心/其他';  // 22:00–23:59
            const sel = document.getElementById('diet-meal-period');
            if (sel) sel.value = period;
        }

        // ─── Init ─────────────────────────────────────────────────────────
        setDefaultMonth();
        setDefaultDate();   // init date picker to today
        setDefaultMealPeriod();
        renderFoodOptions();

        // Accordion toggle (default: collapsed)
        document.getElementById('history-toggle-btn').addEventListener('click', () => {
            const btn = document.getElementById('history-toggle-btn');
            const container = document.getElementById('history-container');
            btn.classList.toggle('collapsed');
            container.classList.toggle('collapsed');
        });

        // Date picker: refresh dashboard + history on change
        document.getElementById('record-date-input').addEventListener('change', () => {
            updateDateViewingBadge();
            updateUI();
        });
        document.getElementById('back-to-today-btn').addEventListener('click', () => {
            document.getElementById('record-date-input').value = todayISO();
            updateDateViewingBadge();
            updateUI();
        });

        updateUI();          // instant local render (from localStorage)
        loadFromFirestore(); // async: fetches cloud data, re-renders when ready
    </script>
</body>

</html>
